# mybatis 配置
# @see MybatisProperties
mybatis.mapper-locations=classpath:mybatis/mapper/*.xml
mybatis.type-aliases-package=springboot.domain.*
# 日志：StdOutImpl-日志输出到控制台 NoLoggingImpl-无日志
mybatis.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl
# pagehelper：https://pagehelper.github.io/docs/howtouse/
pagehelper.helper-dialect=mysql
# pageNumb<=0时查询第一页，pageNum>=pages时查询最后一页
pagehelper.reasonable=true
# 是否支持通过 Mapper 接口参数类传递分页参数
pagehelper.support-methods-arguments=false
# mybatis-plus 配置
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.mapper-locations=classpath:mybatis/mapper/plus/*Mapper.xml
